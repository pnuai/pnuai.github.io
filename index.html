<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부산대학교 AI융합교육원 브로슈어 허브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-600: #4b5563;
      --gray-900: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      line-height: 1.6;
    }
    
    /* Header */
    header {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 60px 24px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: var(--blue-light);
      color: var(--blue);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    p.desc {
      font-size: 1.1rem;
      color: var(--gray-600);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Container */
    .container {
      max-width: 1000px;
      margin: 60px auto 100px;
      padding: 0 24px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
    }

    /* Card */
    .card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 24px;
      padding: 32px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      border-color: var(--blue);
    }
    .card:hover::before {
      transform: scaleX(1);
    }

    .card-year {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.95rem;
      color: var(--gray-600);
      flex: 1;
    }
    .card-arrow {
      margin-top: 24px;
      font-weight: 700;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-arrow::after {
      content: '→';
      transition: transform 0.2s ease;
    }
    .card:hover .card-arrow::after {
      transform: translateX(4px);
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">PNU AI Center</div>
    <h1>온라인 브로슈어 허브</h1>
    <p class="desc">부산대학교 AI융합교육원의 다양한 교육과정과 사업 안내를 온라인 브로슈어로 확인하세요.</p>
  </header>

  <div class="container">
    <div class="grid" id="repo-grid">
      <div style="text-align:center; color:var(--gray-500); grid-column: 1/-1;">
        조직에 등록된 브로슈어를 불러오는 중입니다...
      </div>
    </div>
  </div>

  <script>
    async function loadBrochures() {
      const grid = document.getElementById('repo-grid');
      try {
        // GitHub API를 통해 조직의 레포지토리 목록을 가져옵니다.
        const res = await fetch('https://api.github.com/orgs/pnu-ai-center/repos?sort=updated&per_page=100');
        if (!res.ok) throw new Error('데이터를 불러오지 못했습니다.');
        const repos = await res.json();
        
        // pnu-ai-center.github.io 자체는 제외하고 최신순으로 정렬
        const brochures = repos.filter(r => r.name !== 'pnu-ai-center.github.io');

        if (brochures.length === 0) {
          grid.innerHTML = '<div style="color:var(--gray-500); grid-column: 1/-1;">아직 등록된 브로슈어가 없습니다.</div>';
          return;
        }

        grid.innerHTML = brochures.map(repo => {
          const year = new Date(repo.updated_at).getFullYear();
          const title = repo.name.replace(/-/g, ' ').toUpperCase();
          return `
            <a href="/${repo.name}/" class="card">
              <span class="card-year">${year}</span>
              <h2 class="card-title">${repo.name}</h2>
              <p class="card-desc">${repo.description || '이 브로슈어에 대한 설명이 없습니다.'}</p>
              <div class="card-arrow">브로슈어 보기</div>
            </a>
          `;
        }).join('');
      } catch (e) {
        grid.innerHTML = `<div style="color:var(--red); grid-column: 1/-1;">오류가 발생했습니다: ${e.message}</div>`;
      }
    }

    loadBrochures();
  </script>

</body>
</html>
