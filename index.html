<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부산대학교 AI융합교육원 브로슈어 허브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0a2463;--blue:#1a4fa0;--mid:#2563eb;--light:#60a5fa;--pale:#dbeafe;
      --gold:#f59e0b;--gold2:#fbbf24;--green:#10b981;--teal:#0ea5e9;
      --bg:#f0f4f8;--card:#ffffff;--text:#1e293b;--sub:#64748b;--bdr:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
         background:var(--bg);color:var(--text);line-height:1.65;
         display:flex;flex-direction:column;min-height:100vh}

    /* NAV */
    nav{background:var(--navy);padding:0 32px;height:60px;display:flex;align-items:center;
        justify-content:space-between;position:sticky;top:0;z-index:100;
        box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-brand .lb{background:linear-gradient(135deg,var(--gold),#d97706);width:30px;height:30px;
                    border-radius:7px;display:flex;align-items:center;justify-content:center;
                    font-weight:900;font-size:12px;color:white}
    .nav-brand .bt{color:white;font-weight:800;font-size:16px;letter-spacing:-0.5px}

    /* HERO */
    .hero{background:linear-gradient(145deg,#040d1a 0%,#0a1e3f 40%,#1a4fa0 80%,#0c4a6e 100%);
          padding:90px 40px 80px;text-align:center;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;
                   background:radial-gradient(ellipse 70% 60% at 50% 110%,
                   rgba(99,102,241,.25) 0%,transparent 60%)}
    .hero-inner{position:relative;z-index:1;max-width:860px;margin:0 auto}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:8px;
                   background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.35);
                   border-radius:20px;padding:6px 18px;font-size:13px;color:var(--gold2);
                   font-weight:700;letter-spacing:.5px;margin-bottom:24px}
    .hero-eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--gold2);
                        animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .hero h1{font-size:52px;font-weight:900;color:white;letter-spacing:-1.5px;
              margin-bottom:16px;line-height:1.2}
    .hero h1 .arise{background:linear-gradient(135deg,#f59e0b,#fcd34d);
                     -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero-sub{font-size:17px;color:rgba(255,255,255,.75);line-height:1.8;max-width:600px;margin:0 auto}

    /* Container & Grid */
    .container{max-width:1060px;margin:0 auto;padding:0 24px}
    .section{padding:56px 0}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;margin-top:28px}

    /* Cards */
    .card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;
          overflow:hidden;transition:box-shadow .2s,transform .2s;
          text-decoration:none;color:inherit;display:flex;flex-direction:column;
          padding:32px;position:relative}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
                  background:linear-gradient(90deg,var(--blue),var(--teal));
                  transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
    .card:hover{box-shadow:0 12px 36px rgba(0,0,0,.08);transform:translateY(-4px);border-color:var(--light)}
    .card:hover::before{transform:scaleX(1)}

    .card-year{display:inline-block;font-size:12px;font-weight:800;color:var(--blue);
               background:var(--pale);padding:4px 10px;border-radius:6px;margin-bottom:14px;letter-spacing:0.5px}
    .card-title{font-size:20px;font-weight:800;line-height:1.4;margin-bottom:10px;color:var(--navy)}
    .card-desc{font-size:14px;color:var(--sub);line-height:1.7;flex:1;margin-bottom:24px}
    
    .card-foot{display:flex;align-items:center;justify-content:space-between;
               padding-top:16px;border-top:1px solid var(--bdr)}
    .card-arrow{font-size:13px;font-weight:800;color:var(--mid);display:flex;align-items:center;gap:6px}
    .card-arrow::after{content:'→';transition:transform .2s ease}
    .card:hover .card-arrow::after{transform:translateX(4px)}

    @media(max-width:600px){.hero h1{font-size:36px}}
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-brand">
      <div class="lb">AI</div>
      <div class="bt">부산대학교 AI융합교육원</div>
    </a>
  </nav>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow"><div class="dot"></div> ONLINE HUB</div>
      <h1>온라인 <span class="arise">브로슈어 허브</span></h1>
      <p class="hero-sub">부산대학교 AI융합교육원의 다양한 교육과정과 사업 안내를 세련된 온라인 브로슈어로 확인하세요.</p>
    </div>
  </header>

  <div class="container">
    <div class="grid" id="repo-grid">
      <div style="text-align:center; color:var(--gray-500); grid-column: 1/-1;">
        조직에 등록된 브로슈어를 불러오는 중입니다...
      </div>
    </div>
  </div>

  <script>
    async function loadBrochures() {
      const grid = document.getElementById('repo-grid');
      try {
        // GitHub API를 통해 조직의 레포지토리 목록을 가져옵니다.
        const res = await fetch('https://api.github.com/orgs/pnu-ai-center/repos?sort=updated&per_page=100');
        if (!res.ok) throw new Error('데이터를 불러오지 못했습니다.');
        const repos = await res.json();
        
        // pnu-ai-center.github.io 자체는 제외하고 최신순으로 정렬
        const brochures = repos.filter(r => r.name !== 'pnu-ai-center.github.io');

        if (brochures.length === 0) {
          grid.innerHTML = '<div style="color:var(--gray-500); grid-column: 1/-1;">아직 등록된 브로슈어가 없습니다.</div>';
          return;
        }

        grid.innerHTML = brochures.map(repo => {
          const year = new Date(repo.updated_at).getFullYear();
          const title = repo.name.replace(/-/g, ' ').toUpperCase();
          return `
            <a href="/${repo.name}/" class="card">
              <div>
                <span class="card-year">${year} YEAR</span>
                <h2 class="card-title">${repo.name}</h2>
                <p class="card-desc">${repo.description || '이 브로슈어에 대한 설명이 없습니다. 관리자 페이지에서 설명을 수정할 수 있습니다.'}</p>
              </div>
              <div class="card-foot">
                <span class="card-arrow">브로슈어 열기</span>
              </div>
            </a>
          `;
        }).join('');
      } catch (e) {
        grid.innerHTML = `<div style="color:var(--red); grid-column: 1/-1;">오류가 발생했습니다: ${e.message}</div>`;
      }
    }

    loadBrochures();
  </script>

</body>
</html>
