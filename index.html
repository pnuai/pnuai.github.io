<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부산대학교 AI융합교육원 브로슈어 허브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-600: #4b5563;
      --gray-900: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      line-height: 1.6;
    }
    
    /* Header */
    header {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 60px 24px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: var(--blue-light);
      color: var(--blue);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    p.desc {
      font-size: 1.1rem;
      color: var(--gray-600);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Container */
    .container {
      max-width: 1000px;
      margin: 60px auto 100px;
      padding: 0 24px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
    }

    /* Card */
    .card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 24px;
      padding: 32px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      border-color: var(--blue);
    }
    .card:hover::before {
      transform: scaleX(1);
    }

    .card-year {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.95rem;
      color: var(--gray-600);
      flex: 1;
    }
    .card-arrow {
      margin-top: 24px;
      font-weight: 700;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-arrow::after {
      content: '→';
      transition: transform 0.2s ease;
    }
    .card:hover .card-arrow::after {
      transform: translateX(4px);
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">PNU AI Center</div>
    <h1>온라인 브로슈어 허브</h1>
    <p class="desc">부산대학교 AI융합교육원의 다양한 교육과정과 사업 안내를 온라인 브로슈어로 확인하세요.</p>
  </header>

  <div class="container">
    <div class="grid">
      <!-- 1번 브로슈어 -->
      <a href="/2026-ai-guidebook/" class="card">
        <span class="card-year">2026</span>
        <h2 class="card-title">AI 교육 안내서</h2>
        <p class="card-desc">부산대학교 AI융합교육원의 교육 비전, 교육과정, 교수진 및 지원 절차를 안내합니다.</p>
        <div class="card-arrow">브로슈어 보기</div>
      </a>

      <!-- 예시 브로슈어 (아직 레포를 만들지 않았다면 링크를 비워두거나 준비중으로 표시) -->
      <a href="#" class="card" style="opacity: 0.6;">
        <span class="card-year">2027</span>
        <h2 class="card-title">AI 해커톤 안내 (예시)</h2>
        <p class="card-desc">하반기 AI 해커톤 대회 규정, 시상 내역 및 참가 방법 안내 브로슈어입니다.</p>
        <div class="card-arrow" style="color:var(--gray-600)">준비 중</div>
      </a>
    </div>
  </div>

</body>
</html>
